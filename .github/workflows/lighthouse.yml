name: Lighthouse CI

on:
  push:
    branches: [release]
  pull_request:
    branches: [release]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: corepack enable && yarn install

      - name: Build
        run: yarn build

      - name: Serve production build
        run: yarn preview --port 4173 &
        shell: bash
        background: true

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4173
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
          budgetPath: ./lighthouse-budget.json
          outputPath: ./lighthouse-report

      - name: Print score
        if: always()
        run: |
          cat ./lighthouse-report/report.html | grep -oP '(?<=Performance":)[0-9.]+' || echo "No score found"
          cat ./lighthouse-report/report.html | grep -oP '(?<=Accessibility":)[0-9.]+' || echo "No score found"
          cat ./lighthouse-report/report.html | grep -oP '(?<=Best-Practices":)[0-9.]+' || echo "No score found"
          cat ./lighthouse-report/report.html | grep -oP '(?<=SEO":)[0-9.]+' || echo "No score found"
          cat ./lighthouse-report/report.html | grep -oP '(?<=PWA":)[0-9.]+' || echo "No score found"