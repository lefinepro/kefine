name: CI

on:
  push:
    branches: [release]
  pull_request:
    branches: [release]

jobs:
  githooks:
    name: Run CI hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI hook pipeline
        run: |
          chmod +x .githooks/ci .githooks/pre-commit .githooks/pre-push ./scripts/container-compose.sh ./scripts/crater-smoke.sh
          ./.githooks/ci
