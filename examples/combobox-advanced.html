<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Combobox Features</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 {
      color: #111827;
      margin-bottom: 1rem;
    }
    .example {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: #f9fafb;
      border-radius: 0.5rem;
    }
    .example h2 {
      font-size: 1.125rem;
      margin-top: 0;
      color: #374151;
    }
    .output {
      margin-top: 1rem;
      padding: 0.75rem;
      background: white;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      color: #6b7280;
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    button {
      padding: 0.5rem 1rem;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <h1>Advanced Combobox Features</h1>

  <div class="example">
    <h2>1. Multiple Selection</h2>
    <kf-combobox
      id="multiple"
      multiple
      placeholder="Select multiple items..."
    ></kf-combobox>
    <div class="output" id="multiple-output">No selection</div>
    <div class="controls">
      <button onclick="clearMultiple()">Clear All</button>
      <button onclick="getMultipleSelection()">Get Selection</button>
    </div>
  </div>

  <div class="example">
    <h2>2. Async/Custom Filtering</h2>
    <kf-combobox
      id="async"
      placeholder="Search users (simulates API call)..."
      min-chars="2"
    ></kf-combobox>
    <div class="output" id="async-output">Type at least 2 characters...</div>
  </div>

  <div class="example">
    <h2>3. Large Dataset with Virtualization</h2>
    <kf-combobox
      id="virtualized"
      virtualize
      virtualize-threshold="50"
      highlight-matches
      placeholder="Search through 1000 items..."
    ></kf-combobox>
    <div class="output" id="virtualized-output">Ready to search 1000 items</div>
  </div>

  <div class="example">
    <h2>4. Datalist Integration</h2>
    <kf-combobox id="datalist" placeholder="Choose a color...">
      <datalist slot="options" id="colors">
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="yellow">Yellow</option>
        <option value="purple">Purple</option>
        <option value="orange">Orange</option>
      </datalist>
    </kf-combobox>
    <div class="output" id="datalist-output">No selection</div>
  </div>

  <script type="module">
    // 1. Multiple Selection
    const multipleCombobox = document.getElementById('multiple');
    multipleCombobox.options = [
      { id: "1", label: "JavaScript", value: "js" },
      { id: "2", label: "TypeScript", value: "ts" },
      { id: "3", label: "Python", value: "py" },
      { id: "4", label: "Rust", value: "rust" },
      { id: "5", label: "Go", value: "go" },
      { id: "6", label: "Java", value: "java" },
    ];

    multipleCombobox.addEventListener('kf-combobox-change', (e) => {
      const output = document.getElementById('multiple-output');
      const selected = e.detail.selectedOptions;
      if (selected.length > 0) {
        output.textContent = `Selected: ${selected.map(o => o.label).join(', ')}`;
      } else {
        output.textContent = 'No selection';
      }
    });

    window.clearMultiple = () => {
      multipleCombobox.clear();
    };

    window.getMultipleSelection = () => {
      const selected = multipleCombobox.getSelectedOptions();
      alert(`Selected: ${selected.map(o => o.label).join(', ') || 'None'}`);
    };

    // 2. Async Filtering
    const asyncCombobox = document.getElementById('async');
    const mockUsers = [
      { id: "1", label: "Alice Johnson", value: "alice", type: "user" },
      { id: "2", label: "Bob Smith", value: "bob", type: "user" },
      { id: "3", label: "Charlie Brown", value: "charlie", type: "user" },
      { id: "4", label: "Diana Prince", value: "diana", type: "user" },
      { id: "5", label: "Eve Anderson", value: "eve", type: "user" },
      { id: "6", label: "Frank Miller", value: "frank", type: "user" },
    ];

    asyncCombobox.addEventListener('kf-combobox-beforefilter', async (e) => {
      e.detail.preventDefault();
      const query = e.detail.value.toLowerCase();

      // Show loading state
      asyncCombobox.loading = true;
      document.getElementById('async-output').textContent = 'Searching...';

      // Simulate API delay
      await new Promise(resolve => setTimeout(resolve, 500));

      // Filter results
      const filtered = mockUsers.filter(user =>
        user.label.toLowerCase().includes(query) ||
        user.value.includes(query)
      );

      e.detail.setOptions(filtered);
      asyncCombobox.loading = false;

      document.getElementById('async-output').textContent =
        `Found ${filtered.length} results`;
    });

    asyncCombobox.addEventListener('kf-combobox-select', (e) => {
      document.getElementById('async-output').textContent =
        `Selected: ${e.detail.option.label}`;
    });

    // 3. Virtualization
    const virtualizedCombobox = document.getElementById('virtualized');
    const largeDataset = Array.from({ length: 1000 }, (_, i) => ({
      id: String(i + 1),
      label: `Item ${i + 1}`,
      value: `item-${i + 1}`,
      type: i % 2 === 0 ? 'even' : 'odd',
    }));

    virtualizedCombobox.options = largeDataset;

    virtualizedCombobox.addEventListener('kf-combobox-select', (e) => {
      document.getElementById('virtualized-output').textContent =
        `Selected: ${e.detail.option.label} (${e.detail.value})`;
    });

    // 4. Datalist
    const datalistCombobox = document.getElementById('datalist');
    datalistCombobox.addEventListener('kf-combobox-select', (e) => {
      document.getElementById('datalist-output').textContent =
        `Selected: ${e.detail.option.label} (${e.detail.value})`;
    });
  </script>
</body>
</html>
