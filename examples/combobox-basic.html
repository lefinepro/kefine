<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Combobox Example</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 {
      color: #111827;
      margin-bottom: 1rem;
    }
    .example {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: #f9fafb;
      border-radius: 0.5rem;
    }
    .example h2 {
      font-size: 1.125rem;
      margin-top: 0;
      color: #374151;
    }
    .output {
      margin-top: 1rem;
      padding: 0.75rem;
      background: white;
      border-radius: 0.25rem;
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h1>Basic Combobox Examples</h1>

  <div class="example">
    <h2>1. Default Combobox (includes filter)</h2>
    <kf-combobox id="basic" placeholder="Search components..."></kf-combobox>
    <div class="output" id="basic-output">No selection</div>
  </div>

  <div class="example">
    <h2>2. Starts With Filter</h2>
    <kf-combobox
      id="startswith"
      search="startswith"
      placeholder="Type to search (starts with)..."
    ></kf-combobox>
    <div class="output" id="startswith-output">No selection</div>
  </div>

  <div class="example">
    <h2>3. Pattern (Regex) Filter</h2>
    <kf-combobox
      id="pattern"
      search="pattern"
      placeholder="Try regex patterns..."
    ></kf-combobox>
    <div class="output" id="pattern-output">No selection</div>
  </div>

  <div class="example">
    <h2>4. With Text Highlighting</h2>
    <kf-combobox
      id="highlight"
      highlight-matches
      placeholder="Search with highlighting..."
    ></kf-combobox>
    <div class="output" id="highlight-output">No selection</div>
  </div>

  <div class="example">
    <h2>5. Disabled State</h2>
    <kf-combobox
      id="disabled"
      disabled
      value="Disabled combobox"
      placeholder="This is disabled"
    ></kf-combobox>
  </div>

  <script type="module">
    // Sample options
    const options = [
      { id: "1", label: "Button Component", value: "button", type: "component" },
      { id: "2", label: "Card Component", value: "card", type: "component" },
      { id: "3", label: "Badge Component", value: "badge", type: "component" },
      { id: "4", label: "Input Component", value: "input", type: "component" },
      { id: "5", label: "Components Page", value: "components", type: "page" },
      { id: "6", label: "Documentation", value: "docs", type: "page" },
      { id: "7", label: "Examples", value: "examples", type: "page" },
      { id: "8", label: "Settings", value: "settings", type: "page" },
    ];

    // Set options for all comboboxes
    ['basic', 'startswith', 'pattern', 'highlight'].forEach(id => {
      const combobox = document.getElementById(id);
      combobox.options = options;

      // Listen to select events
      combobox.addEventListener('kf-combobox-select', (e) => {
        const output = document.getElementById(`${id}-output`);
        output.textContent = `Selected: ${e.detail.option.label} (${e.detail.value})`;
      });

      // Listen to clear events
      combobox.addEventListener('kf-combobox-clear', () => {
        const output = document.getElementById(`${id}-output`);
        output.textContent = 'Cleared';
      });
    });
  </script>
</body>
</html>
