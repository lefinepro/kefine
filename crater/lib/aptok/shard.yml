name: aptok
version: 0.2.0

authors:
  - Lefine Team

description: Crystal ActivityPub federation toolkit inspired by Fedify, with ForgeFed and marketplace helpers.

license: 0BSD

targets:
  aptok:
    main: src/aptok.cr

dependencies:
  db:
    github: crystal-lang/crystal-db
    version: ~> 0.13.0
  pg:
    github: will/crystal-pg
    version: ~> 0.29.0
  sqlite3:
    github: crystal-lang/crystal-sqlite3
    version: ~> 0.21.0

crystal: ">= 1.12.0"

libraries:
  libsqlite3: ">= 3.11.0"
