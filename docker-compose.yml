services:
  postgres:
    container_name: kefine-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kefine
      POSTGRES_USER: kefine
      POSTGRES_PASSWORD: kefine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kefine -d kefine"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kefine

  lepos:
    container_name: kefine-lepos
    build:
      context: .
      dockerfile: crater/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kefine:kefine@postgres:5432/kefine
      KEFINE_PRIVATEKEY_DEFAULT: ${KEFINE_PRIVATEKEY_DEFAULT:-}
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL:-https://problemsets.lefine.pro}
      MADDY_SMTP_HOST: ${MADDY_SMTP_HOST:-mail.lefine.pro}
      MADDY_SMTP_PORT: ${MADDY_SMTP_PORT:-587}
      MADDY_SMTP_USERNAME: ${MADDY_SMTP_USERNAME:-app@lefine.pro}
      MADDY_SMTP_PASSWORD: ${MADDY_SMTP_PASSWORD}
      MADDY_FROM_EMAIL: ${MADDY_FROM_EMAIL:-noreply@lefine.pro}
      MADDY_FROM_NAME: ${MADDY_FROM_NAME:-Lefine}
    working_dir: /app
    command: ["crystal", "run", "src/crater.cr"]
    volumes:
      - ./crater/src:/app/src
      - ./crater/shard.yml:/app/shard.yml:ro
      - ./crater/shard.lock:/app/shard.lock:ro
      - ./kefine.config.json:/app/kefine.config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/3001 && printf \"GET /health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3001:3001"
    networks:
      kefine:
        aliases:
          - crater

  frontend:
    container_name: kefine-frontend
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    depends_on:
      lepos:
        condition: service_healthy
    environment:
      CRATER_BASE_URL: http://lepos:3001
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL:-https://problemsets.lefine.pro}
      LEFINE_INTEGRATION_SECRET: dev-only-lefine-octra-shared-secret-change-me
    ports:
      - "5173:5173"
    networks:
      - kefine

volumes:
  postgres-data:

networks:
  kefine:
    name: kefine
