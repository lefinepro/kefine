services:
  caddy:
    image: caddy:2-alpine
    container_name: kefine-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - lefine-net

  postgres:
    container_name: kefine-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kefine
      POSTGRES_USER: kefine
      POSTGRES_PASSWORD: ${KEFINE_POSTGRES_PASSWORD:-kefine}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kefine -d kefine"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lefine-net

  crater:
    container_name: kefine-crater
    build:
      context: .
      dockerfile: crater/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://kefine:${KEFINE_POSTGRES_PASSWORD:-kefine}@postgres:5432/kefine
      KEFINE_PRIVATEKEY_DEFAULT: ${KEFINE_PRIVATEKEY_DEFAULT:-}
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL:-http://fmatch:7277}
      MADDY_SMTP_HOST: ${MADDY_SMTP_HOST:-mail.lefine.pro}
      MADDY_SMTP_PORT: ${MADDY_SMTP_PORT:-587}
      MADDY_SMTP_USERNAME: ${MADDY_SMTP_USERNAME:-app@lefine.pro}
      MADDY_SMTP_PASSWORD: ${MADDY_SMTP_PASSWORD}
      MADDY_FROM_EMAIL: ${MADDY_FROM_EMAIL:-noreply@lefine.pro}
      MADDY_FROM_NAME: ${MADDY_FROM_NAME:-Lefine}
    working_dir: /app
    command: ["crystal", "run", "src/crater.cr"]
    volumes:
      - ./crater/src:/app/src
      - ./crater/shard.yml:/app/shard.yml:ro
      - ./crater/shard.lock:/app/shard.lock:ro
      - ./kefine.config.json:/app/kefine.config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/3001 && printf \"GET /health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3001:3001"
    networks:
      lefine-net:
        aliases:
          - kefine-crater

  frontend:
    container_name: kefine-frontend
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    depends_on:
      crater:
        condition: service_healthy
    environment:
      CRATER_BASE_URL: http://kefine-crater:3001
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL:-http://fmatch:7277}
      LEFINE_INTEGRATION_SECRET: ${LEFINE_INTEGRATION_SECRET:-}
    ports:
      - "5173:5173"
    networks:
      - lefine-net

  crater-openai:
    container_name: crater-openai
    build:
      context: ../crater-openai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      CRATER_FORGEFED_INBOX: ${CRATER_FORGEFED_INBOX:-http://fmatch:7277/inbox/feed}
      CRATER_FORGEFED_ACTOR: ${CRATER_FORGEFED_ACTOR:-https://lefine.pro/openai/actors/crater}
      CRATER_FORGEFED_TARGET: ${CRATER_FORGEFED_TARGET:-}
      CRATER_LOCAL_PRIVATE_KEY_PEM: ${CRATER_LOCAL_PRIVATE_KEY_PEM:-}
      CRATER_LOCAL_KEY_ID: ${CRATER_LOCAL_KEY_ID:-}
      CRATER_LOCAL_ACTOR: ${CRATER_LOCAL_ACTOR:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
    networks:
      - lefine-net

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  lefine-net:
    name: lefine-net
    external: true
