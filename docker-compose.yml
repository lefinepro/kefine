services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kefine
      POSTGRES_USER: kefine
      POSTGRES_PASSWORD: kefine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  crater:
    build:
      context: .
      dockerfile: crater/Dockerfile
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      - crater
    ports:
      - "5173:5173"

volumes:
  postgres-data:
